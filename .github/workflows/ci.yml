name: CI

on:
  push:
    branches: [main, master]
  pull_request_target:
    paths:
      - src/**
      - test/**
      - '*.json'
      - '*.js'
      - '*.ts'
      - lib/**
      - scripts/**
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        node-version: [22.x]
        platform:
          - os: ubuntu-24.04
            shell: bash
          - os: macos-15
            shell: bash
          - os: windows-2025
            shell: bash
          - os: windows-2025
            shell: powershell
      fail-fast: false

    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        shell: ${{ matrix.platform.shell }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Use Nodejs ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Seal Security Fix
        uses: seal-community/cli-action@latest
        with:
          mode: fix
          fix_mode: remote
          token: ${{ secrets.SEAL_TOKEN }}
          project: minimatch-6158
          target: package-lock.json

      - name: Run Tests
        run: npm test -- -c -t0
